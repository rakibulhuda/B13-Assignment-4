<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="icon" href="./assets/job-seeking.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body{
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
<!--Tracker Section-->
<section class="max-w-[75%] mx-auto w-[1600px] h-[2819px] py-15">
    <h1 class="text-3xl font-bold mb-5">Job Application Tracker</h1>
    <div class="flex flex-col md:flex-row gap-5 ">
        <div class="w-[360px] h-[97px] pl-5 py-5 bg-white border-gray-300 shadow-gray-300 shadow-md">
            <p class="text-[14px]">Total</p>
            <p class="text-[24px] font-bold" id="totalJobCount"></p>
        </div>
        <div class="w-[360px] h-[97px] pl-5 py-5 bg-white border-gray-300 shadow-gray-300 shadow-md">
            <p class="text-[14px]">Interview</p>
            <p class="text-[24px] font-bold text-green-500" id="interviewedCount"></p>
        </div>
        <div class="w-[360px] h-[97px] pl-5 py-5 bg-white border-gray-300 shadow-gray-300 shadow-md">
            <p class="text-[14px]">Rejected</p>
            <p class="text-[24px] font-bold text-red-500" id="rejectedCount"></p>
        </div>
    </div>
</section>
<script src="./scripts/tracker.js"></script>
</body>
</html>
